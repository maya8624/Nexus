name: Deploy to Azure App Service

on:
  push:
    branches:
      - main

permissions:
  id-token: write
  contents: read

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore dependencies
        run: dotnet restore Nexus.Api/Nexus.Api.csproj

      - name: Build
        run: dotnet build Nexus.Api/Nexus.Api.csproj -c Release --no-restore

      - name: Test
        run: dotnet test Nexus.Tests/Nexus.Tests.csproj --no-restore --verbosity normal --filter "Category=Unit"

      - name: Publish
        run: dotnet publish Nexus.Api/Nexus.Api.csproj -c Release -o ./publish --no-build

      - name: Azure login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy to Azure App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: nexus-api
          package: ./publish
